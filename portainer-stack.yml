services:
  haga-rpi-temp-logger:
    image: ghcr.io/YOUR_GITHUB_USER_OR_ORG/haga-rpi-temp-logger:latest
    container_name: haga-rpi-temp-logger
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      DEFAULT_POLL_SECONDS: "10"
      DEFAULT_INTERVAL_SECONDS: "10"
      DEFAULT_TIMEZONE_OFFSET: "+02:00"
      DB_PATH: "/data/logger.db"
      EXPORT_DIR: "/data/exports"
      W1_BASE_PATH: "/sys/bus/w1/devices"
      SENSOR_LABELS: "28-xxxxxxxxxxxx:Probe A,28-yyyyyyyyyyyy:Probe B"
      HTTPS_CERTFILE: "/certs/cert.pem"
      HTTPS_KEYFILE: "/certs/key.pem"
      NETWORK_MANAGER_ENABLED: "true"
      NETWORK_AP_INTERFACE: "wlan0"
      NETWORK_AP_CONNECTION_NAME: "haga-fallback-ap"
      NETWORK_WIRED_INTERFACE: "eth0"
      NETWORK_WIRED_CONNECTION_NAME: "haga-eth0"
      STORAGE_HEARTBEAT_PATH: "/data/heartbeat.json"
      STORAGE_PROBE_INTERVAL_SECONDS: "15"
      STORAGE_LOW_FREE_GB_WARNING: "2.0"
      STORAGE_WATCHDOG_ENABLED: "true"
      STORAGE_WATCHDOG_REBOOT_AFTER_SECONDS: "600"
    volumes:
      - /opt/haga-logger/data:/data
      - /opt/haga-logger/certs:/certs:ro
      - /sys/bus/w1/devices:/sys/bus/w1/devices:ro
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      - /etc/machine-id:/etc/machine-id:ro
